<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Corporate</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <div id="login-container" class="auth-container">
        <!-- Login Form Injected Here -->
    </div>

    <div id="app-container" class="dashboard-container" style="display: none;">
        <aside class="sidebar">
            <div class="logo">
                <h2>Steelflex<span>Admin</span></h2>
            </div>
            <nav id="nav-menu">
                <!-- Navigation Items -->
            </nav>
            <div class="user-profile">
                <div class="user-info">
                    <span id="current-user-name">User</span>
                    <small id="current-user-role">Role</small>
                </div>
                <button id="logout-btn"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="mobile-brand">
                    <h2>Steelflex<span>Admin</span></h2>
                </div>
                <h1 id="page-title">Dashboard</h1>
            </header>
            <div id="content-area" class="content-area">
                <!-- Dynamic Content -->
            </div>
        </main>
    </div>

    <div id="toast-container"></div>
    <div id="modal-container"></div>

    <script src="/js/app.js"></script>
</body>

</html>
